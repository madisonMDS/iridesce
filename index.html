<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iridesce</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="js/main.js" defer></script>

</head>
<body>

<div class="frame">

    <div class="status-bar">
        <img src="images/status-bar.png" alt="Status Bar" class="status-bar">
    </div>

    <div class="stars">
        <img src="images/stars.png" alt="Stars" class="stars">
    </div>

    <div class="header">
        <img src="images/logo.png" alt="Logo" class="logo">
        <p>3rd of June 2026</p>
        <h1>Hi there, [Name]!</h1>
        <img src="images/calendar.png" alt="Calendar" class="calendar">
    </div>

    <div class="add-entry">
        <img src="images/lined-paper.png" alt="Lined Paper" class="lined-paper">
        <button class="add-entry-button"><h3>Add Entry</h3></button>
    </div>

    <div class="navigation">
        <button class="nav-button"><img src="images/calendar-icon.png" alt="Calendar Button"></button>
        <button class="nav-button"><img src="images/home-icon.png" alt="Home Button"></button>
        <button class="nav-button"><img src="images/add-icon.png" alt="Add Button"></button>
        <button class="nav-button"><img src="images/discover-icon.png" alt="Discover Button"></button>
        <button class="nav-button"><img src="images/profile-icon.png" alt="Profile Button"></button>

    </div>
    
</div>


</body>
</html>
